name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags, e.g., v1.0.0

permissions:
  contents: write

jobs:
  goreleaser:
    name: Release via GoReleaser
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs the git history/tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run Tests
        run: make test

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          # Used to create the GitHub Release on md-paste
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Used to push the formula to stn1slv/homebrew-tap
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
