version: "2"

run:
  timeout: 5m
  go: "1.26"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocritic
    - gosec
    - bodyclose
    - noctx
    - errorlint
    - prealloc
    - unparam
    - nilerr
    - forcetypeassert
    - makezero
    - exhaustive
    - goconst
    - misspell
    - testifylint

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      module-path: github.com/stn1slv/md-paste
      extra-rules: true

linters-settings:
  revive:
    rules:
      - name: context-as-first-argument
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: var-naming
      - name: package-comments
  exhaustive:
    default-signifies-exhaustive: true
  goconst:
    min-len: 3
    min-occurrences: 3
  testifylint:
    enable-all: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
