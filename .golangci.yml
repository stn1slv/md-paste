version: "2"
linters:
  default: none
  enable:
    - gocritic
    - gosec
    - govet
    - prealloc
    - revive
    - staticcheck
  settings:
    govet:
      disable:
        - fieldalignment
      enable-all: true
    revive:
      enable-all-rules: true
      rules:
        - name: line-length-limit
          disabled: true
        - name: unhandled-error
          disabled: true
        - name: banned-characters
          disabled: true
        - name: add-constant
          disabled: true
        - name: cognitive-complexity
          arguments: [20]
        - name: function-length
          arguments: [150, 0]
        - name: max-public-structs
          disabled: true
        - name: cyclomatic
          arguments: [15]
        - name: argument-limit
          arguments: [8]
        - name: function-result-limit
          arguments: [4]
        - name: file-header
          disabled: true
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
